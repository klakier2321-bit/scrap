  requires_confirmation: true
  supports_market_entry: true
exit_semantics:
  time_stop: true
  structure_exit: true
telemetry_requirements: [setup_detected, signal_built, blocked_by_risk, blocked_by_execution, entry, exit, invalidation]
backtest_priority: high
steward_agent_role: Panic Reversal Steward
owner_team: strategy_stewards
dependencies: [regime_engine, derivatives_feed, risk_engine, execution_guard]
implementation_status: implemented
notes:
  - Event-native strategy; must never run on low-reliability panic proxy alone.
