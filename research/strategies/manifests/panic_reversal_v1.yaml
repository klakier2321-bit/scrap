strategy_id: panic_reversal_v1
display_name: Panic Reversal
version: "1.0.0"
strategy_family: panic_reversal
risk_profile: aggressive
execution_style: reversal
archetype: exhaustion or capitulation reversal
status: experimental
supported_regimes: [stress_panic]
supported_market_states: [transition]
supported_market_phases: [transition, expansion]
supported_volatility_phases: [extreme, expanding]
supported_biases: [neutral, long]
supported_event_contexts: [panic_flush, capitulation]
minimum_data_trust: limited_trust
disallowed_conditions: [no_trade_zone]
