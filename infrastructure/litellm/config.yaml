model_list:
  - model_name: cheap
    litellm_params:
      model: os.environ/AGENT_CHEAP_MODEL
      api_key: os.environ/OPENAI_API_KEY
  - model_name: gpt-5-mini
    litellm_params:
      model: os.environ/AGENT_CHEAP_MODEL
      api_key: os.environ/OPENAI_API_KEY
  - model_name: strong
    litellm_params:
      model: os.environ/AGENT_STRONG_MODEL
      api_key: os.environ/OPENAI_API_KEY
  - model_name: gpt-5.4
    litellm_params:
      model: os.environ/AGENT_STRONG_MODEL
      api_key: os.environ/OPENAI_API_KEY

litellm_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
