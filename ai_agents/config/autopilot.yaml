autopilot:
  objective: "Rownolegle domykac architekture, control plane, monitoring, API i GUI oraz uruchomic foundation pionu strategii futures tak, aby platforma budowala edge bez chaosu i bez naruszania zasad bezpieczenstwa."
  auto_start: true
  poll_interval_seconds: 300
  max_cycles: 0

  tasks:
    - name: "lead_next_increment"
      agent_name: "system_lead_agent"
      goal: "Wyznacz jeden maly, konkretny i bezpieczny krok, ktory domyka architekture, control plane, monitoring, API, GUI lub foundation pionu strategii futures bez naruszania runtime tradingowego."
      business_reason: "Glowny agent ma stale pilnowac kolejnosci prac i rownowagi miedzy platforma a nowo aktywowanym pionem strategii futures."
      requested_paths:
        - "docs/"
        - "core/"
        - "ai_agents/"
        - "monitoring/"
        - "data/ai_control/dry_run_snapshots/"
        - "data/ai_control/strategy_reports/"
      risk_level: "medium"
      cross_layer: true
      does_touch_contract: false
      does_touch_runtime: false
      force_strong_model: false
      auto_approve: true

    - name: "lead_executive_watch"
      agent_name: "system_lead_agent"
      goal: "Na podstawie roadmapy executive, statusu taskow i ostatnich runow przygotuj krotka notatke zarzadcza: co zostalo domkniete w platformie oraz co ruszylo w pionie strategii futures."
      business_reason: "Pulpit prezesa ma pokazywac rownoczesnie porzadkowanie platformy i uruchomienie strategy factory foundation."
      requested_paths:
        - "ai_agents/config/executive_roadmap.yaml"
        - "core/executive_report.py"
        - "infrastructure/grafana/"
        - "docs/"
        - "data/ai_control/dry_run_snapshots/"
        - "data/ai_control/strategy_reports/"
      risk_level: "medium"
      cross_layer: true
      does_touch_contract: false
      does_touch_runtime: false
      force_strong_model: false
      auto_approve: true

    - name: "monitoring_dry_run_watch"
      agent_name: "monitoring_agent"
      goal: "Sprawdz, czy dashboardy, metryki i alerty jasno pokazuja stan platformy oraz postep foundation pionu strategii futures."
      business_reason: "Chcemy, aby prezes i operator widzieli postep porzadkowania platformy i rozwoju strategy factory, a nie tylko stan runtime."
      requested_paths:
        - "infrastructure/grafana/"
        - "infrastructure/prometheus/"
        - "core/metrics.py"
        - "data/ai_control/dry_run_snapshots/"
        - "data/ai_control/strategy_reports/"
      risk_level: "low"
      cross_layer: false
      does_touch_contract: false
      does_touch_runtime: false
      force_strong_model: false
      auto_approve: false

    - name: "architecture_business_refinement"
      agent_name: "architecture_agent"
      goal: "Doprecyzuj docelowa architekture platformy i nowego pionu strategii futures jezykiem biznesowym, tak aby control layer sterowal, Freqtrade wykonywal, a research layer budowal edge."
      business_reason: "Chcemy unikac dryfu architektury i wejsc w kolejny etap ze spojna platforma oraz jasno opisanym pionem futures strategy factory."
      requested_paths:
        - "docs/ARCHITECTURE.md"
        - "docs/PROJECT_MAP.md"
        - "docs/TRADING_SYSTEM_MASTER_PLAN.md"
        - "docs/DECISIONS.md"
      risk_level: "medium"
      cross_layer: false
      does_touch_contract: false
      does_touch_runtime: false
      force_strong_model: false
      auto_approve: false

    - name: "strategy_lead_foundation"
      agent_name: "strategy_agent"
      goal: "Jako strategy lead wyznacz jeden maly, konkretny i bezpieczny krok dla futures strategy factory: lifecycle, handoff helperow albo promotion gate."
      business_reason: "Pion strategii futures ma ruszyc od razu, ale przez male, reviewowalne foundation tasks zamiast chaosu."
      requested_paths:
        - "docs/"
        - "research/"
        - "trading/"
        - "data/ai_control/dry_run_snapshots/"
        - "data/ai_control/strategy_reports/"
        - "core/risk_manager.py"
      risk_level: "medium"
      cross_layer: true
      does_touch_contract: false
      does_touch_runtime: false
      force_strong_model: false
      auto_approve: false

    - name: "feature_foundation_watch"
      agent_name: "feature_engineering_agent"
      goal: "Doprecyzuj foundation futures-aware dataset buildera i feature store v1 tak, aby strategy factory miala versioned inputs zamiast luznych pomyslow."
      business_reason: "Strategy factory potrzebuje danych i cech jako foundation, inaczej hipotezy beda chaotyczne i nieporownywalne."
      requested_paths:
        - "docs/FUTURES_TRADING_MODEL.md"
        - "docs/RESEARCH_LAYER.md"
        - "docs/FEATURE_STORE.md"
        - "research/"
        - "data/ai_control/dry_run_snapshots/"
        - "data/ai_control/strategy_reports/"
      risk_level: "low"
      cross_layer: false
      does_touch_contract: false
      does_touch_runtime: false
      force_strong_model: false
      auto_approve: false

    - name: "risk_research_foundation"
      agent_name: "risk_research_agent"
      goal: "Doprecyzuj foundation futures risk architecture dla leverage, liquidation, funding drag, concentration i exposure tak, aby strategy factory byla risk-first."
      business_reason: "Przewaga nie ma sensu bez futures-aware risk architecture, wiec risk research musi ruszyc od razu razem z foundation strategii."
      requested_paths:
        - "docs/FUTURES_TRADING_MODEL.md"
        - "docs/RISK_MODEL_FUTURES.md"
        - "docs/SYSTEM_OPERATING_MODEL.md"
        - "research/"
        - "core/risk_manager.py"
        - "data/ai_control/dry_run_snapshots/"
      risk_level: "low"
      cross_layer: false
      does_touch_contract: false
      does_touch_runtime: false
      force_strong_model: false
      auto_approve: false
