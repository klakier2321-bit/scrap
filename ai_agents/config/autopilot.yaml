autopilot:
  objective: "Produkować realne kandydaty strategii futures szybciej przez candidate-first loop: hypothesis -> strategy -> broad backtests -> risk gate -> promotion decision -> limited dry_run. Nie spalac mocy na szeroki foundation/docs, jesli aktywny kandydat nie ma jeszcze kompletnego evidence bundle."
  auto_start: true
  poll_interval_seconds: 600
  max_cycles: 0

  tasks:
    - name: "candidate_runtime_watch"
      agent_name: "strategy_agent"
      goal: "Przesun aktywny kandydat strategii o jeden stan lifecycle: zbierz brakujace evidence, zadecyduj `reject / iterate / move_to_backtest / move_to_limited_dry_run` i nie generuj foundation-only taskow, jesli kandydat nie ma pelnego evidence bundle."
      business_reason: "Strategy lead ma zarzadzac konkretnym portfolio kandydatow, a nie wracac do szerokich taskow dokumentacyjnych."
      requested_paths:
        - "research/candidates/structured_futures_baseline_v1/"
        - "research/candidates/structured_futures_short_breakdown_v1/"
        - "research/candidates/structured_futures_long_continuation_v1/"
        - "research/evaluation/"
        - "research/promotion/"
        - "trading/freqtrade/user_data/strategies/structured_futures_baseline_strategy.py"
        - "data/ai_control/dry_run_snapshots/"
        - "data/ai_control/strategy_reports/"
      risk_level: "medium"
      cross_layer: false
      does_touch_contract: false
      does_touch_runtime: false
      force_strong_model: false
      auto_approve: false
      allow_parallel: true

    - name: "candidate_short_build"
      agent_name: "alpha_research_agent"
      goal: "Zbuduj osobny short candidate futures jako research experiment: osobna hipoteza, osobny manifest i osobna strategia short-only lub short-first. Nie mieszaj tego z baseline'em."
      business_reason: "Short ma byc rozwijany jako osobny kandydat zamiast dalej zanieczyszczac baseline long-biased."
      requested_paths:
        - "research/candidates/structured_futures_short_breakdown_v1/"
        - "trading/freqtrade/user_data/strategies/structured_futures_short_breakdown_strategy.py"
        - "trading/freqtrade/user_data/strategies/structured_futures_baseline_strategy.py"
        - "data/ai_control/strategy_reports/"
      risk_level: "medium"
      cross_layer: false
      does_touch_contract: false
      does_touch_runtime: false
      force_strong_model: false
      auto_approve: false
      allow_parallel: true

    - name: "candidate_feature_support"
      agent_name: "feature_engineering_agent"
      goal: "Dostarcz tylko dataset spec i feature manifest potrzebny dla aktywnego albo bezposrednio nastepnego kandydata. Nie wracaj do ogolnego feature-store sweepu."
      business_reason: "Kandydaci potrzebuja versioned inputs per candidate, inaczej strategy lead sklada evidence z luznych notatek."
      requested_paths:
        - "research/datasets/"
        - "research/features/"
        - "research/candidates/"
        - "trading/freqtrade/user_data/strategies/"
      risk_level: "low"
      cross_layer: false
      does_touch_contract: false
      does_touch_runtime: false
      force_strong_model: false
      auto_approve: false
      allow_parallel: true

    - name: "candidate_risk_support"
      agent_name: "risk_research_agent"
      goal: "Zaktualizuj tylko risk gate aktywnego lub nastepnego kandydata: leverage, exposure, side imbalance i decyzja czy dana strona ma byc aktywna czy zaparkowana."
      business_reason: "Risk gate ma filtrowac kandydatow szybko i per candidate, zamiast tworzyc szerokie foundation docs bez ruchu na strategiach."
      requested_paths:
        - "research/risk/"
        - "research/candidates/"
        - "docs/RISK_MODEL_FUTURES.md"
        - "core/risk_manager.py"
        - "data/ai_control/strategy_reports/"
      risk_level: "low"
      cross_layer: false
      does_touch_contract: false
      does_touch_runtime: false
      force_strong_model: false
      auto_approve: false
      allow_parallel: true

    - name: "candidate_eval_watch"
      agent_name: "experiment_evaluation_agent"
      goal: "Ocen aktywny kandydat przez broad backtest bundle z ustalonymi 4 oknami, porownaj go z poprzednim stanem i zwroc jeden werdykt evidence-based."
      business_reason: "Realne zarabiajace strategie powstana tylko wtedy, gdy kandydaci beda szybko i brutalnie odsiewani tym samym zestawem okien i progow."
      requested_paths:
        - "research/evaluation/"
        - "research/promotion/"
        - "research/candidates/"
        - "research/risk/"
        - "trading/freqtrade/user_data/backtest_results/"
      risk_level: "low"
      cross_layer: false
      does_touch_contract: false
      does_touch_runtime: false
      force_strong_model: false
      auto_approve: false
      allow_parallel: true
