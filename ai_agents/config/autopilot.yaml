autopilot:
  objective: "Najpierw zbudowac mocny, futures-aware regime detector, a dopiero potem wracac do strategii budowanych pod konkretne reżimy rynku. Freeze build, keep dry-run telemetry."
  auto_start: true
  poll_interval_seconds: 600
  max_cycles: 0

  tasks:
    - name: "strategy_regime_alignment"
      agent_name: "strategy_agent"
      goal: "Utrzymuj lifecycle kandydatow w trybie frozen_pending_regime_engine, dopinaj allowed/blocked regimes, entry_contexts i regime_risk_policy. Nie generuj nowych build-taskow strategii."
      business_reason: "Pion strategii ma pozostac uporzadkowany, ale aktywne budowanie kandydatow jest zamrozone do czasu gotowego regime detectora."
      requested_paths:
        - "research/candidates/"
        - "research/promotion/"
        - "docs/STRATEGY_LIFECYCLE.md"
        - "docs/STRATEGY_PROMOTION_PIPELINE.md"
        - "docs/REGIME_DETECTION.md"
      risk_level: "low"
      cross_layer: false
      does_touch_contract: false
      does_touch_runtime: false
      force_strong_model: false
      auto_approve: false
      allow_parallel: true

    - name: "regime_core_build"
      agent_name: "regime_model_agent"
      goal: "Zbuduj i utrzymuj kanoniczny Regime Detector v1: 6 reżimow, confidence, risk level, reasons, latest.json i historia. To jest teraz glowny write lane strategii."
      business_reason: "Dalsze poprawianie strategii bez porzadnego podzialu rynku na reżimy prowadzi do chaosu i zlej oceny kandydatow."
      requested_paths:
        - "core/regime_detector.py"
        - "research/regimes/"
        - "docs/REGIME_DETECTION.md"
        - "data/ai_control/regime/"
        - "core/tests/test_regime_detector.py"
      risk_level: "medium"
      cross_layer: false
      does_touch_contract: true
      does_touch_runtime: false
      force_strong_model: false
      auto_approve: false
      allow_parallel: true

    - name: "regime_feature_support"
      agent_name: "feature_engineering_agent"
      goal: "Dostarcz regime feature snapshot i manifest: trend, volatility, volume, session i derivatives context dla futures. Nie rozwijaj nowych candidate packetow."
      business_reason: "Detektor reżimu potrzebuje stabilnych, audytowalnych cech zanim powstana kolejne strategie pod reżimy."
      requested_paths:
        - "research/features/"
        - "research/datasets/"
        - "research/regimes/"
        - "docs/FEATURE_STORE.md"
        - "docs/RESEARCH_LAYER.md"
      risk_level: "low"
      cross_layer: false
      does_touch_contract: false
      does_touch_runtime: false
      force_strong_model: false
      auto_approve: false
      allow_parallel: true

    - name: "regime_risk_mapping"
      agent_name: "risk_research_agent"
      goal: "Zmapuj reżimy rynku na polityki ryzyka: leverage, exposure, concurrency, stress derisking i side parking. Nie buduj nowych candidate risk packetow."
      business_reason: "Platforma ma najpierw wiedziec jak rynek wplywa na ryzyko, a dopiero potem jakie strategie warto pod niego uruchamiac."
      requested_paths:
        - "research/risk/"
        - "research/regimes/"
        - "docs/RISK_MODEL_FUTURES.md"
        - "docs/SYSTEM_OPERATING_MODEL.md"
        - "core/risk_manager.py"
      risk_level: "low"
      cross_layer: false
      does_touch_contract: false
      does_touch_runtime: false
      force_strong_model: false
      auto_approve: false
      allow_parallel: true
