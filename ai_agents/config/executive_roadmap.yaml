      next_milestone: "Miec futures risk foundation v1 jako wejscie do promotion gate i helper handoffow"
      risk_level: "Średnie"
      executive_note: "Przewaga nie ma sensu bez futures-aware ryzyka; ta warstwa ma powstrzymac chaos typu profit-only."
      paths:
        - "docs/RISK_MODEL_FUTURES.md"
        - "docs/SYSTEM_OPERATING_MODEL.md"
        - "research/risk/"
        - "core/risk_manager.py"
        - "data/ai_control/dry_run_snapshots/"

