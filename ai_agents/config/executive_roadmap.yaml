      owner_agent: "feature_engineering_agent"
      status: "W toku"
      progress_pct: 34
      direction: "Zbudowac versioned foundation danych i cech, zeby helperzy nie pracowali na luznych pomyslach"
      current_focus: "Dopiac futures-aware dataset builder v1 i feature store v1 na poziomie kontraktow i artefaktow"
      next_milestone: "Miec kanoniczny feature foundation dla strategii futures z czytelnym ownership i versioningiem"
      risk_level: "Średnie"
      executive_note: "To jest pierwszy realny fundament edge factory: bez porzadnych danych i cech strategia bedzie improwizowac."
      paths:
        - "docs/RESEARCH_LAYER.md"
        - "docs/FEATURE_STORE.md"
        - "research/datasets/"
        - "research/features/"
        - "data/ai_control/strategy_reports/"

