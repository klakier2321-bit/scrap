executive_dashboard:
  title: "Pulpit Prezesa"
  subtitle: "Jeden widok dla decyzji zarządczych, priorytetów, ryzyk i postępu pracy nad platformą tradingową."
  strategic_goal: "Budować skuteczny, risk-adjusted system tradingowy: najpierw uruchomić powtarzalną pracę na realnych danych w dry_run, wyciągać wnioski z wyników i dopiero potem rozszerzać automatyzację."

  assumptions:
    - id: "assumption_control_over_execution"
      title: "Control layer steruje, Freqtrade wykonuje"
      status: "Obowiązuje"
      description: "Cała docelowa logika systemowa ma należeć do control layer. Freqtrade pozostaje execution engine i nie staje się mózgiem platformy."
      why_it_matters: "Chroni architekturę przed chaosem i utrzymuje jeden punkt odpowiedzialności za decyzje systemowe."

    - id: "assumption_ai_no_live_trading"
      title: "AI nie wykonuje bezpośrednio live tradingu"
      status: "Obowiązuje"
      description: "Agenci AI mogą planować, analizować i raportować, ale nie dostają bezpośredniej ścieżki do giełdy ani do uruchamiania live trade."
      why_it_matters: "To utrzymuje bezpieczeństwo operacyjne i zmniejsza ryzyko kosztownego błędu automatyki."

    - id: "assumption_human_review_high_risk"
      title: "Zmiany ryzykowne pozostają pod review człowieka"
      status: "Obowiązuje"
      description: "Zmiany cross-layer, kosztowo istotne, runtime-sensitive lub architektonicznie ważne nie mogą przechodzić bez ludzkiej decyzji."
      why_it_matters: "Dzięki temu tempo rozwoju nie wygrywa z bezpieczeństwem i odpowiedzialnością."

    - id: "assumption_exec_dashboard_for_management"
      title: "Dashboard ma służyć zarządowi, nie tylko koderom"
      status: "Wdrażane"
      description: "Raportowanie ma tłumaczyć moduły, ryzyka, decyzje i postęp prostym językiem, bez wymagania znajomości kodu."
      why_it_matters: "Pozwala prowadzić projekt z poziomu celów i decyzji, a nie z poziomu plików i logów."

  modules:
    - id: "executive_reporting"
      name: "Raportowanie zarządcze"
      owner_agent: "system_lead_agent"
      status: "W toku"
      progress_pct: 92
      direction: "Widok prezesa, status modułów, otwarte decyzje i ryzyka"
      current_focus: "Stale aktualizować dashboard o założenia, zmiany, uwagi lead agenta i status domykania tasków"
      next_milestone: "Utrzymać dashboard jako główne miejsce raportowania dla prezesa i porządkowania roadmapy"
      risk_level: "Średnie"
      executive_note: "Główny pulpit już działa; teraz ma regularnie raportować postęp, zmiany, ryzyka i to, czego potrzebujemy od Ciebie"
      paths:
        - "infrastructure/grafana/"
        - "core/metrics.py"
        - "core/executive_report.py"
        - "core/api.py"

    - id: "crewai_control_plane"
      name: "CrewAI i control plane"
      owner_agent: "system_lead_agent"
      status: "W toku"
      progress_pct: 88
      direction: "Bezpieczna praca agentów przez policy gate, review i kontrolę kosztów"
      current_focus: "Przestawić system na lead queue, worktree per task i supervised write dla agentów kodujących"
      next_milestone: "Mieć stabilny coding supervisor z jednym agentem kodującym naraz i pełnym raportowaniem do prezesa"
      risk_level: "Wysokie"
      executive_note: "Ciągła pętla już działa; teraz lead ma delegować taski, a agenci modułowi mają kodować w izolowanych worktree"
      paths:
        - "ai_agents/runtime/"
        - "ai_agents/config/"
        - "core/autopilot.py"
        - "core/orchestrator.py"
        - "core/api.py"

    - id: "canonical_docs"
      name: "Dokumentacja i architektura"
      owner_agent: "architecture_agent"
      status: "W toku"
      progress_pct: 88
      direction: "Jedna wersja prawdy dla architektury, decyzji i zasad bezpieczeństwa"
      current_focus: "Przepisać kluczowe opisy architektury na język biznesowy i stanowczy: control layer steruje, Freqtrade wykonuje"
      next_milestone: "Mieć krótką, zarządczą wersję architektury bez rozmywania odpowiedzialności między warstwami"
      risk_level: "Niskie"
      executive_note: "Możesz oczekiwać jasnych, biznesowych opisów zamiast technicznego chaosu"
      paths:
        - "docs/"
        - "README.md"
        - "ARCHITECTURE.md"
        - "AGENT_"

    - id: "monitoring_and_visibility"
      name: "Monitoring i widoczność systemu"
      owner_agent: "monitoring_agent"
      status: "W toku"
      progress_pct: 82
      direction: "Pokazywać koszty, aktywność agentów, ryzyka i stan tradingu jednym językiem"
      current_focus: "Poszerzyć Grafanę o założenia, zmiany, uwagi lead agenta i sygnały o taskach domkniętych"
      next_milestone: "Pokazywać pełny stan projektu z perspektywy prezesa bez potrzeby zaglądania do kodu"
      risk_level: "Średnie"
      executive_note: "Jeśli chcesz inny układ informacji, to właśnie ten moduł powinien go dostarczyć"
      paths:
        - "infrastructure/grafana/"
        - "infrastructure/prometheus/"
        - "infrastructure/tempo/"
        - "monitoring/"

    - id: "control_layer_runtime"
      name: "Control layer"
      owner_agent: "control_layer_agent"
      status: "W toku"
      progress_pct: 72
      direction: "Budować prawdziwy mózg systemowy nad Freqtrade"
      current_focus: "Dowozic tylko te małe przyrosty control layer, które bezpośrednio odblokowują pracę strategii i danych dry_run"
      next_milestone: "Stabilnie wspierać strategię i monitoring bez rozbudowywania control layer ponad to, co potrzebne do dry_run"
      risk_level: "Średnie"
      executive_note: "To pierwszy moduł, na którym testujemy model: lead deleguje, agent koduje, review zatwierdza, a main pozostaje bez auto-merge"
      paths:
        - "core/"

    - id: "strategy_and_backtests"
      name: "Strategie i backtesty"
      owner_agent: "strategy_agent"
      status: "W toku"
      progress_pct: 64
      direction: "Pracować na realnych danych dry_run i raportach, budując drogę do zysku skorygowanego o ryzyko"
      current_focus: "Analizować najnowsze snapshoty dry_run i raporty strategii, aby wyprowadzać małe kroki poprawiające gotowość systemu do zarabiania"
      next_milestone: "Mieć pierwszy powtarzalny workflow strategii oparty o snapshoty dry_run oraz jasny executive summary z wnioskami"
      risk_level: "Średnie"
      executive_note: "To jest teraz główny priorytet: pracować na danych dry_run i szukać drogi do skutecznego zarabiania bez wchodzenia w live trading"
      paths:
        - "trading/"
        - "data/ai_control/strategy_reports/"

    - id: "trading_runtime"
      name: "Runtime tradingowy"
      owner_agent: "review_agent"
      status: "Stabilny zakres"
      progress_pct: 78
      direction: "Utrzymać Freqtrade jako execution engine w dry_run i dać agentom tylko bezpieczny, read-only wgląd w runtime"
      current_focus: "Utrzymać stabilny dry_run i świeże snapshoty jako paliwo dla pracy strategii"
      next_milestone: "Mieć stale świeże dane runtime, na których agenci mogą pracować bez dotykania live tradingu"
      risk_level: "Wysokie"
      executive_note: "To jest obszar, gdzie bezpieczeństwo wygrywa z tempem zmian; jedyny wysoki-risk krok wymaga ręcznego gate człowieka"
      paths:
        - "trading/freqtrade/"
        - "RISK_RULES.md"
        - "CONFIGURATION_POLICY.md"
        - "core/"

  tasks:
    - id: "exec_dashboard_main"
      module_id: "executive_reporting"
      title: "Zbudować główny dashboard prezesa w Grafanie"
      status: "Zamknięte"
      owner_agent: "system_lead_agent"
      priority: "Wysoki"
      needs_human: "Nie"
      next_step: "Zadanie wykonane; teraz utrzymywać dashboard jako główne miejsce raportowania zarządczego"

    - id: "exec_dashboard_watch"
      module_id: "executive_reporting"
      title: "Utrzymywać dashboard prezesa jako żywy raport zmian, uwag i decyzji"
      status: "W toku"
      owner_agent: "system_lead_agent"
      priority: "Wysoki"
      needs_human: "Nie"
      next_step: "Dopinać założenia, ostatnie zmiany, uwagi lead agenta i sygnały o domknięciu tasków"

    - id: "autopilot_second_cycle"
      module_id: "crewai_control_plane"
      title: "Potwierdzić drugi i kolejne cykle autopilota"
      status: "Zamknięte"
      owner_agent: "system_lead_agent"
      priority: "Wysoki"
      needs_human: "Nie"
      next_step: "Wielocyklowość potwierdzona; teraz usuwać fallback do mock i wzmacniać jakość ciągłych runów"

    - id: "coding_supervisor_v1"
      module_id: "crewai_control_plane"
      title: "Uruchomić supervised write: lead queue, worktree i review przed commitem"
      status: "W toku"
      owner_agent: "system_lead_agent"
      priority: "Wysoki"
      needs_human: "Nie"
      next_step: "Spiać coding tasks, workspaces, operator panel i executive dashboard w jeden przepływ"

    - id: "docs_ci_checks"
      module_id: "canonical_docs"
      title: "Dodać lekkie kontrole jakości dokumentacji w CI"
      status: "Gotowe do startu"
      owner_agent: "review_agent"
      priority: "Średni"
      needs_human: "Nie"
      next_step: "Wybrać minimalny zestaw: link-checker, markdown lint, kontrola spójności"

    - id: "ceo_readable_architecture"
      module_id: "canonical_docs"
      title: "Doprecyzować architekturę językiem zrozumiałym dla biznesu"
      status: "W toku"
      owner_agent: "architecture_agent"
      priority: "Średni"
      needs_human: "Nie"
      next_step: "Przepisać ARCHITECTURE.md i PROJECT_MAP.md językiem biznesowym i stanowczym: control layer steruje, Freqtrade wykonuje"

    - id: "monitoring_for_management"
      module_id: "monitoring_and_visibility"
      title: "Rozszerzyć monitoring o zmiany, założenia i uwagi dla prezesa"
      status: "W toku"
      owner_agent: "monitoring_agent"
      priority: "Wysoki"
      needs_human: "Nie"
      next_step: "Wyeksponować status modułów, ryzyka, decyzje, aktywność agentów i ostatnie efekty pracy"

    - id: "monitoring_coding_flow"
      module_id: "monitoring_and_visibility"
      title: "Pokazać coding tasks, workspaces i review w pulpicie prezesa"
      status: "W toku"
      owner_agent: "monitoring_agent"
      priority: "Średni"
      needs_human: "Nie"
      next_step: "Wyeksponować co jest teraz budowane, co czeka na review i co jest już zacommitowane"

    - id: "control_layer_scope"
      module_id: "control_layer_runtime"
      title: "Doprecyzować plan rozwoju control layer bez naruszania runtime"
      status: "W toku"
      owner_agent: "control_layer_agent"
      priority: "Średni"
      needs_human: "Nie"
      next_step: "Po pierwszym offline'owym slice wybrać następny mały workflow bez integracji z runtime"

    - id: "control_layer_first_coding_flow"
      module_id: "control_layer_runtime"
      title: "Dowieźć pierwszy commit control_layer_agent z izolowanego worktree"
      status: "Zamknięte"
      owner_agent: "control_layer_agent"
      priority: "Wysoki"
      needs_human: "Tak"
      next_step: "Pierwszy commit z supervised write został dowieziony; teraz utrzymywać małe, reviewowalne przyrosty."

    - id: "control_layer_first_slice"
      module_id: "control_layer_runtime"
      title: "Zbudować pierwszy offline'owy slice control layer z local-only registry"
      status: "Zamknięte"
      owner_agent: "control_layer_agent"
      priority: "Wysoki"
      needs_human: "Nie"
      next_step: "Przyrost wykonany; kolejne workflow muszą pozostać małe, odwracalne i oddzielone od runtime tradingowego"

    - id: "strategy_reporting_depth"
      module_id: "strategy_and_backtests"
      title: "Rozszerzyć raport strategii o czytelne porównanie zysku i drawdownu"
      status: "W toku"
      owner_agent: "strategy_agent"
      priority: "Wysoki"
      needs_human: "Nie"
      next_step: "Analizować latest snapshoty dry_run i raporty strategii, a potem podać executive summary: co poprawiać, by dojść do zarabiającego systemu"

    - id: "strategy_dry_run_loop"
      module_id: "strategy_and_backtests"
      title: "Uruchomić stałą analizę danych dry_run przez strategy_agent"
      status: "W toku"
      owner_agent: "strategy_agent"
      priority: "Wysoki"
      needs_human: "Nie"
      next_step: "Na podstawie snapshotów dry_run i assessmentów wyznaczać jeden bezpieczny krok poprawiający gotowość systemu do zarabiania"

    - id: "dry_run_runtime_bridge"
      module_id: "control_layer_runtime"
      title: "Zbudować read-only bridge do runtime Freqtrade i pipeline snapshotów"
      status: "Zamknięte"
      owner_agent: "control_layer_agent"
      priority: "Wysoki"
      needs_human: "Nie"
      next_step: "Bridge działa, snapshoty powstają i dane są bezpiecznie przekazywane do panelu oraz executive report."

    - id: "dry_run_runtime_activation"
      module_id: "trading_runtime"
      title: "Przełączyć Freqtrade z webserver-only na prawdziwy dry_run i aktywować wewnętrzne API"
      status: "Zamknięte"
      owner_agent: "review_agent"
      priority: "Wysoki"
      needs_human: "Tak"
      next_step: "Runtime działa już w prawdziwym dry_run; teraz utrzymywać read-only dostęp i pilnować bezpieczeństwa."

    - id: "dry_run_visibility"
      module_id: "monitoring_and_visibility"
      title: "Pokazać gotowość dry_run, wiek snapshotów i blokady danych runtime"
      status: "Zamknięte"
      owner_agent: "monitoring_agent"
      priority: "Wysoki"
      needs_human: "Nie"
      next_step: "Pulpit prezesa i panel operatora pokazują gotowość dry run, świeżość snapshotów i główne blokady."

    - id: "runtime_protection"
      module_id: "trading_runtime"
      title: "Utrzymać runtime tradingowy poza zwykłym zasięgiem agentów"
      status: "Monitorowane"
      owner_agent: "review_agent"
      priority: "Wysoki"
      needs_human: "Nie"
      next_step: "Regularnie sprawdzać, czy nowe workflow nie otwierają drogi AI do live tradingu"

  decisions:
    - id: "next_priority_after_exec"
      title: "Wybrać następny priorytet po dashboardzie prezesa"
      area: "Roadmapa produktu"
      priority: "Wysoki"
      status: "Potwierdzone"
      expected_from_ceo: "Priorytet potwierdzony: najpierw strategy/backtest workflow na danych dry_run; control layer rozwijamy tylko tyle, ile odblokowuje strategię."
      impact: "Sprinty i budżet agentów mają teraz iść przede wszystkim w pracę na danych dry_run i budowę drogi do skutecznego, risk-adjusted zarabiania."

    - id: "architecture_language_level"
      title: "Potwierdzić docelowy język opisu architektury"
      area: "Dokumentacja i komunikacja"
      priority: "Średni"
      status: "Potwierdzone"
      expected_from_ceo: "Dokumenty mają być przede wszystkim biznesowe, krótkie i stanowcze. Wprost: control layer steruje, Freqtrade wykonuje."
      impact: "Materiały dla zarządu i zespołu mają upraszczać decyzje, a nie rozmywać architekturę technicznym językiem."

    - id: "autopilot_expansion"
      title: "Zgoda na rozszerzenie autopilota po stabilizacji"
      area: "Praca agentów"
      priority: "Średni"
      status: "Potwierdzone"
      expected_from_ceo: "Rozszerzyć autopilota tylko o bezpieczne, read-only zadania na danych dry_run i raportowaniu strategii. Bez live tradingu i bez write do runtime."
      impact: "Agenci mogą już stale pracować na danych dry_run, ale nadal bez prawa do sterowania tradingiem."

  risks:
    - id: "autopilot_fallback"
      title: "Część runów autopilota nadal wpada w mock fallback mimo działającej pętli"
      area: "CrewAI"
      severity: "Wysokie"
      status: "Otwarte"
      mitigation: "Utrzymać działającą pętlę, ale dopracować integrację z realnym modelem i structured output, żeby lead agent raportował stabilnie bez awaryjnego fallbacku."

    - id: "executive_blind_spot"
      title: "Brak jednego zarządczego widoku powoduje chaos informacyjny"
      area: "Reporting"
      severity: "Średnie"
      status: "W trakcie ograniczania"
      mitigation: "Budować executive dashboard w Grafanie i prowadzić jeden, czytelny język raportowania."

    - id: "strategy_overreach"
      title: "Presja na szybki zysk może wypchnąć projekt poza zasady ryzyka"
      area: "Trading"
      severity: "Wysokie"
      status: "Otwarte"
      mitigation: "Zarabiania szukamy najpierw w dry_run, na metrykach risk-adjusted profit. Żadnych skrótów do live tradingu bez review i decyzji człowieka."

    - id: "scope_chaos"
      title: "Agenci mogą zacząć rozmywać odpowiedzialności między warstwami"
      area: "Governance"
      severity: "Średnie"
      status: "Monitorowane"
      mitigation: "Ownership, review, small change i executive dashboard pokazujący dokładnie kto nad czym pracuje."
