coding_runtime:
  enabled: true
  auto_start: true
  lead_refresh_interval_seconds: 300
  dispatcher_poll_interval_seconds: 60
  max_active_tasks: 1
  max_target_files: 6

  modules:
    - module_id: "candidate_baseline_runtime"
      owner_agent: "strategy_agent"
      enabled: false
      priority: 18
      max_target_files: 3
      title: "Baseline runtime candidate"
      module_summary: "Shipping baseline jest zamrozony jako telemetry lane do czasu gotowego regime detectora."
      read_only_context:
        - "docs/ARCHITECTURE.md"
        - "docs/FUTURES_TRADING_MODEL.md"
        - "docs/STRATEGY_LIFECYCLE.md"
        - "docs/STRATEGY_PROMOTION_PIPELINE.md"
        - "data/ai_control/dry_run_snapshots/"
        - "data/ai_control/strategy_reports/"
        - "core/strategy_manager.py"
        - "core/risk_manager.py"
      target_candidates:
        - "trading/freqtrade/user_data/strategies/structured_futures_baseline_strategy.py"
        - "research/candidates/structured_futures_baseline_v1/hypothesis.md"
        - "research/candidates/structured_futures_baseline_v1/strategy_manifest.yaml"
        - "research/promotion/structured_futures_baseline_v1_promotion_decision.md"
      acceptance_checks:
        - "Write lane pozostaje zamrozony, dopoki regime detector nie bedzie gotowy."
        - "Baseline pozostaje tylko telemetry lane z parked short."
        - "Kazda decyzja strategy leada ma wskazywac freeze i zaleznosc od regime engine."
      required_tests:
        - "python -m compileall trading"
        - "python -m unittest trading.tests.test_structured_futures_baseline"
      definition_of_done:
        - "Manifest i promotion decision baseline'u sa zgodne z freeze-build keep-dry-run."
        - "Diff jest maly, reviewowalny i nie reaktywuje candidate sprintu."

    - module_id: "candidate_short_research"
      owner_agent: "alpha_research_agent"
      enabled: false
      priority: 12
      max_target_files: 3
      title: "Short candidate research"
      module_summary: "Short candidate pozostaje zamrozony do czasu gotowego regime detectora."
      read_only_context:
        - "docs/FUTURES_TRADING_MODEL.md"
        - "docs/STRATEGY_LIFECYCLE.md"
        - "data/ai_control/dry_run_snapshots/"
        - "data/ai_control/strategy_reports/"
        - "trading/freqtrade/user_data/strategies/structured_futures_baseline_strategy.py"
      target_candidates:
        - "trading/freqtrade/user_data/strategies/structured_futures_short_breakdown_strategy.py"
        - "research/candidates/structured_futures_short_breakdown_v1/hypothesis.md"
        - "research/candidates/structured_futures_short_breakdown_v1/strategy_manifest.yaml"
      acceptance_checks:
        - "Short candidate jest osobnym obiektem researchu i nie nadpisuje baseline'u."
        - "Hipoteza jest falsyfikowalna i futures-aware."
        - "Task nie miesza logiki strategii z risk reportem ani promotion decision."
      required_tests:
        - "python -m compileall trading"
        - "python -m unittest trading.tests.test_structured_futures_baseline"
      definition_of_done:
        - "Short candidate pozostaje w stanie `frozen_pending_regime_engine`."
        - "Nie powstaja nowe write-taski shortowe przed regime core."

    - module_id: "candidate_feature_support"
      owner_agent: "feature_engineering_agent"
      enabled: false
      priority: 14
      max_target_files: 3
      title: "Candidate feature support"
      module_summary: "Stary candidate feature lane jest wstrzymany; aktywne sa tylko regime features."
      read_only_context:
        - "docs/FUTURES_TRADING_MODEL.md"
        - "docs/FEATURE_STORE.md"
        - "trading/freqtrade/user_data/strategies/structured_futures_baseline_strategy.py"
        - "data/ai_control/dry_run_snapshots/"
        - "data/ai_control/strategy_reports/"
      target_candidates:
        - "research/datasets/structured_futures_baseline_v1_dataset_spec.yaml"
        - "research/datasets/structured_futures_long_continuation_v1_dataset_spec.yaml"
        - "research/features/structured_futures_baseline_v1_feature_manifest.yaml"
        - "research/features/structured_futures_short_breakdown_v1_feature_manifest.yaml"
        - "research/features/structured_futures_long_continuation_v1_feature_manifest.yaml"
      acceptance_checks:
        - "Ten lane pozostaje wylaczony podczas freeze."
        - "Jesli powstaje nowy feature artifact, musi sluzyc regime detectorowi, nie nowemu kandydatowi."
        - "Brak zmian w runtime tradingowym."
      required_tests:
        - "python -m unittest trading.tests.test_structured_futures_baseline"
      definition_of_done:
        - "Candidate feature build nie jest reaktywowany przed regime detector."
        - "Nowe artefakty cech sa kierowane do regime feature support."

    - module_id: "candidate_risk_gate"
      owner_agent: "risk_research_agent"
      enabled: false
      priority: 14
      max_target_files: 3
      title: "Candidate risk gate"
      module_summary: "Stary candidate risk lane jest wstrzymany; aktywne jest tylko regime-aware risk mapping."
      read_only_context:
        - "docs/FUTURES_TRADING_MODEL.md"
        - "docs/STRATEGY_PROMOTION_PIPELINE.md"
        - "core/risk_manager.py"
        - "data/ai_control/strategy_reports/"
      target_candidates:
        - "research/risk/structured_futures_baseline_v1_risk_report.json"
        - "research/risk/structured_futures_short_breakdown_v1_risk_report.json"
        - "research/risk/structured_futures_long_continuation_v1_risk_report.json"
      acceptance_checks:
        - "Ten lane pozostaje wylaczony podczas freeze."
        - "Ryzyko ma byc mapowane na reżimy rynku, nie na nowe iteracje kandydatow."
        - "Brak omijania RiskManagera i brak zmian w runtime tradingowym."
      required_tests:
        - "python -m unittest trading.tests.test_structured_futures_baseline"
      definition_of_done:
        - "Candidate risk build nie jest reaktywowany przed regime detector."
        - "Nowe mapowania ryzyka sa kierowane do regime_risk_mapping."

    - module_id: "regime_detection"
      owner_agent: "regime_model_agent"
      enabled: true
      priority: 100
      max_target_files: 3
      title: "Regime detection"
      module_summary: "Buduj kanoniczny, futures-aware regime detector jako glowny write lane strategii."
      read_only_context:
        - "docs/FUTURES_TRADING_MODEL.md"
        - "docs/RESEARCH_LAYER.md"
        - "docs/REGIME_DETECTION.md"
        - "data/ai_control/dry_run_snapshots/"
        - "data/ai_control/strategy_reports/"
      target_candidates:
        - "core/regime_detector.py"
        - "docs/REGIME_DETECTION.md"
        - "research/regimes/"
        - "data/ai_control/regime/"
      acceptance_checks:
        - "Rezimy sa operacyjne, nie magiczne."
        - "Detektor generuje latest.json i historie jako jedyna prawde runtime."
        - "Model reżimow wspiera future strategy gating i risk mapping."
      required_tests:
        - "python -m compileall core"
        - "python -m unittest core.tests.test_regime_detector"
      definition_of_done:
        - "Istnieje jawny kontrakt reżimow do uzycia przez operator API, strategy lead i risk."
        - "Regime detector klasyfikuje 6 glownych stanów rynku i zapisuje runtime artifacts."

    - module_id: "candidate_evaluation"
      owner_agent: "experiment_evaluation_agent"
      enabled: false
      priority: 12
      max_target_files: 3
      title: "Candidate evaluation"
      module_summary: "Candidate evaluation pozostaje wstrzymane do czasu gotowego regime detectora i oceny per regime."
      read_only_context:
        - "docs/STRATEGY_LIFECYCLE.md"
        - "docs/STRATEGY_PROMOTION_PIPELINE.md"
        - "trading/freqtrade/user_data/backtest_results/"
        - "data/ai_control/dry_run_snapshots/"
        - "data/ai_control/strategy_reports/"
      target_candidates:
        - "research/evaluation/structured_futures_baseline_v1_broad_backtest_summary.json"
        - "research/evaluation/structured_futures_short_breakdown_v1_broad_backtest_summary.json"
        - "research/evaluation/structured_futures_long_continuation_v1_broad_backtest_summary.json"
        - "research/promotion/structured_futures_baseline_v1_promotion_decision.md"
        - "research/promotion/structured_futures_short_breakdown_v1_promotion_decision.md"
        - "research/promotion/structured_futures_long_continuation_v1_promotion_decision.md"
      acceptance_checks:
        - "Ten lane pozostaje wylaczony podczas freeze."
        - "Po odmrozeniu evaluation ma byc globalne plus per regime."
        - "Brak promotion bez evidence bundle."
      required_tests:
        - "python -m unittest trading.tests.test_structured_futures_baseline"
      definition_of_done:
        - "Candidate evaluation nie jest reaktywowane przed regime detector."
        - "Po odmrozeniu ocena ma byc porownywalna miedzy kandydatami i reżimami."

    - module_id: "regime_feature_support"
      owner_agent: "feature_engineering_agent"
      enabled: true
      priority: 97
      max_target_files: 3
      title: "Regime feature support"
      module_summary: "Buduj tylko te cechy i manifesty, ktore zasilaja regime detector."
      read_only_context:
        - "docs/FUTURES_TRADING_MODEL.md"
        - "docs/FEATURE_STORE.md"
        - "docs/REGIME_DETECTION.md"
        - "data/ai_control/dry_run_snapshots/"
      target_candidates:
        - "research/features/"
        - "research/datasets/"
        - "research/regimes/"
      acceptance_checks:
        - "Artefakty sa tworzone dla regime detectora, nie dla nowych kandydatow."
        - "Brak zmian w runtime tradingowym."
        - "Diff pozostaje maly i auditowalny."
      required_tests:
        - "python -m unittest core.tests.test_regime_detector"
      definition_of_done:
        - "Istnieje jawny regime feature packet lub manifest."
        - "Detektor dostaje mierzalne wejscia dla trendu, zmiennosci i wolumenu."

    - module_id: "regime_risk_mapping"
      owner_agent: "risk_research_agent"
      enabled: true
      priority: 96
      max_target_files: 3
      title: "Regime risk mapping"
      module_summary: "Mapuj reżimy rynku na polityki ryzyka futures."
      read_only_context:
        - "docs/RISK_MODEL_FUTURES.md"
        - "docs/SYSTEM_OPERATING_MODEL.md"
        - "docs/REGIME_DETECTION.md"
        - "core/risk_manager.py"
      target_candidates:
        - "research/risk/"
        - "research/regimes/"
        - "docs/RISK_MODEL_FUTURES.md"
      acceptance_checks:
        - "Mapowanie ryzyka dotyczy trendu, range, high_vol i stress_panic."
        - "Brak nowych risk packetow dla kandydatow w czasie freeze."
        - "Brak zmian w runtime tradingowym."
      required_tests:
        - "python -m compileall core"
      definition_of_done:
        - "Istnieje jawne regime -> risk policy mapping."
        - "Warstwa ryzyka potrafi wskazac, kiedy rynek wymaga deriskingu lub blokady wejsc."

    - module_id: "strategy_regime_alignment"
      owner_agent: "strategy_agent"
      enabled: true
      priority: 95
      max_target_files: 3
      title: "Strategy regime alignment"
      module_summary: "Utrzymuj kandydatow w stanie frozen_pending_regime_engine i dopinaj kontrakty regime-aware."
      read_only_context:
        - "docs/STRATEGY_LIFECYCLE.md"
        - "docs/STRATEGY_PROMOTION_PIPELINE.md"
        - "docs/REGIME_DETECTION.md"
        - "research/candidates/"
      target_candidates:
        - "research/candidates/"
        - "research/promotion/"
      acceptance_checks:
        - "Kandydaci pozostaja zamrozeni do czasu gotowego regime detectora."
        - "Manifesty maja allowed_primary_regimes, blocked_primary_regimes, entry_contexts i regime_risk_policy."
        - "Brak nowych strategy build-taskow."
      required_tests:
        - "python -m unittest core.tests.test_strategy_manager"
      definition_of_done:
        - "Lifecycle kandydatow jest zgodny z freeze-build keep-dry-run."
        - "Strategy lead nie generuje nowych sprintow kandydatowych przed regime core."

    - module_id: "control_layer_runtime"
      owner_agent: "control_layer_agent"
      enabled: true
      priority: 45
      title: "Control layer"
      module_summary: "Buduj tylko te male, reviewable przyrosty control layer w core/, ktore bezposrednio odblokowuja dane dry_run, strategie i bezpieczna obserwowalnosc systemu."
      read_only_context:
        - "docs/ARCHITECTURE.md"
        - "docs/PROJECT_MAP.md"
        - "AGENT_BOUNDARIES.md"
      target_candidates:
        - "core/"
        - "core/README.md"
        - "core/control_layer/"
        - "core/dry_run_manager.py"
        - "core/freqtrade_runtime.py"
      acceptance_checks:
        - "Zmiana zostaje w core/ i nie daje agentom write dostepu do runtime tradingowego."
        - "Read-only bridge nie ujawnia sekretow ani configow agentom."
        - "Diff pozostaje maly i reviewable."
      required_tests:
        - "python -m compileall core"
        - "python -m unittest discover -s core/tests -p test_*.py"
      definition_of_done:
        - "Kod dziala lokalnie i przechodzi wskazane checki."
        - "Nie ma zmian poza owned scope."
        - "Review agent moze ocenic diff bez dodatkowego kontekstu."

    - module_id: "monitoring_and_visibility"
      owner_agent: "monitoring_agent"
      enabled: false
      priority: 20
      title: "Monitoring i widocznosc"
      module_summary: "Rozwijaj Grafane, Prometheusa i raportowanie dla prezesa tak, aby bylo jasno widac gotowosc dry_run, swiezosc snapshotow i droge systemu do skutecznego zarabiania."
      read_only_context:
        - "docs/ARCHITECTURE.md"
        - "docs/PROJECT_MAP.md"
        - "ai_agents/config/executive_roadmap.yaml"
      target_candidates:
        - "infrastructure/grafana/dashboards/executive-roadmap.json"
        - "infrastructure/prometheus/alerts/ai_control_rules.yml"
        - "core/metrics.py"
      acceptance_checks:
        - "Zmiana zostaje w monitoringu i dashboardach."
        - "Nie ma zmian w trading runtime ani sekretach."
        - "Raportowanie jest po polsku i czytelne dla prezesa."
      required_tests:
        - "python -m compileall core"
      definition_of_done:
        - "Dashboard lub metryki sa czytelne i spójne."
        - "Diff nie narusza ownership innych warstw."

    - module_id: "api_contracts"
      owner_agent: "api_agent"
      enabled: false
      priority: 15
      title: "API i kontrakty"
      module_summary: "Rozwijaj wewnetrzne API control layer i kontrakty bez wchodzenia w trading runtime."
      read_only_context:
        - "docs/openapi.yaml"
        - "docs/ARCHITECTURE.md"
        - "AGENT_BOUNDARIES.md"
      target_candidates:
        - "core/api.py"
        - "core/schemas.py"
      acceptance_checks:
        - "Zmiana pozostaje w API i kontraktach."
        - "Brak dotkniecia live tradingu i sekretow."
        - "Publiczny kontrakt openapi nie jest rozszerzany przez endpointy operatorskie."
      required_tests:
        - "python -m compileall core"
      definition_of_done:
        - "Endpointy lub typy sa zrozumiale i reviewable."
        - "Zmiana nie wykracza poza approved scope."

    - module_id: "operator_gui"
      owner_agent: "gui_agent"
      enabled: false
      priority: 10
      title: "GUI operatorskie"
      module_summary: "Poprawiaj panel operatorski i zarzadcze widoki bez zamieniania ich w kosztowny chat."
      read_only_context:
        - "docs/ARCHITECTURE.md"
        - "ai_agents/config/executive_roadmap.yaml"
        - "core/api.py"
      target_candidates:
        - "core/templates/"
      acceptance_checks:
        - "Widoki sa po polsku i czytelne."
        - "Zmiana nie wymaga dotkniecia runtime tradingowego."
        - "Panel pozostaje operacyjny, a nie chatowy."
      required_tests:
        - "python -m compileall core"
      definition_of_done:
        - "UI jest czytelne i dziala z aktualnym API."
        - "Diff pozostaje we wlasnym scope GUI."
