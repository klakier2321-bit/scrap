coding_runtime:
  enabled: true
  auto_start: true
  lead_refresh_interval_seconds: 300
  dispatcher_poll_interval_seconds: 60
  max_active_tasks: 1
  max_target_files: 6

  modules:
    - module_id: "candidate_baseline_runtime"
      owner_agent: "strategy_agent"
      enabled: true
      priority: 100
      max_target_files: 3
      title: "Baseline runtime candidate"
      module_summary: "Strategy lead utrzymuje biezacy baseline candidate: manifest, promotion decision i shipping do ograniczonego dry_run."
      read_only_context:
        - "docs/ARCHITECTURE.md"
        - "docs/FUTURES_TRADING_MODEL.md"
        - "docs/STRATEGY_LIFECYCLE.md"
        - "docs/STRATEGY_PROMOTION_PIPELINE.md"
        - "data/ai_control/dry_run_snapshots/"
        - "data/ai_control/strategy_reports/"
        - "core/strategy_manager.py"
        - "core/risk_manager.py"
      target_candidates:
        - "trading/freqtrade/user_data/strategies/structured_futures_baseline_strategy.py"
        - "research/candidates/structured_futures_baseline_v1/hypothesis.md"
        - "research/candidates/structured_futures_baseline_v1/strategy_manifest.yaml"
        - "research/promotion/structured_futures_baseline_v1_promotion_decision.md"
      acceptance_checks:
        - "Zmiana dotyczy tylko aktywnego baseline candidate, nie szerokiego foundation sweepu."
        - "Baseline moze byc promowany tylko jako long-biased limited dry_run candidate, jesli short jest jawnie zaparkowany."
        - "Kazda decyzja strategy leada wskazuje lifecycle, missing evidence i jeden next step."
      required_tests:
        - "python -m compileall trading"
        - "python -m unittest trading.tests.test_structured_futures_baseline"
      definition_of_done:
        - "Baseline candidate ma aktualny manifest, broad backtest evidence i promotion decision."
        - "Diff jest maly, reviewowalny i nie wykracza poza scope jednego kandydata."

    - module_id: "candidate_short_research"
      owner_agent: "alpha_research_agent"
      enabled: true
      priority: 98
      max_target_files: 3
      title: "Short candidate research"
      module_summary: "Buduj osobny kandydat short-only albo short-first, bez mieszania go z baseline'em."
      read_only_context:
        - "docs/FUTURES_TRADING_MODEL.md"
        - "docs/STRATEGY_LIFECYCLE.md"
        - "data/ai_control/dry_run_snapshots/"
        - "data/ai_control/strategy_reports/"
        - "trading/freqtrade/user_data/strategies/structured_futures_baseline_strategy.py"
      target_candidates:
        - "trading/freqtrade/user_data/strategies/structured_futures_short_breakdown_strategy.py"
        - "research/candidates/structured_futures_short_breakdown_v1/hypothesis.md"
        - "research/candidates/structured_futures_short_breakdown_v1/strategy_manifest.yaml"
      acceptance_checks:
        - "Short candidate jest osobnym obiektem researchu i nie nadpisuje baseline'u."
        - "Hipoteza jest falsyfikowalna i futures-aware."
        - "Task nie miesza logiki strategii z risk reportem ani promotion decision."
      required_tests:
        - "python -m compileall trading"
        - "python -m unittest trading.tests.test_structured_futures_baseline"
      definition_of_done:
        - "Istnieje osobny short candidate z hipoteza, manifestem i kompilujaca sie strategia."
        - "Candidate pozostaje w stanie `research_experiment`, dopoki nie ma broad backtest evidence."

    - module_id: "candidate_feature_support"
      owner_agent: "feature_engineering_agent"
      enabled: true
      priority: 96
      max_target_files: 3
      title: "Candidate feature support"
      module_summary: "Dostarczaj tylko dataset spec i feature manifest potrzebny dla konkretnego kandydata, bez szerokiego feature-store sweepu."
      read_only_context:
        - "docs/FUTURES_TRADING_MODEL.md"
        - "docs/FEATURE_STORE.md"
        - "trading/freqtrade/user_data/strategies/structured_futures_baseline_strategy.py"
        - "data/ai_control/dry_run_snapshots/"
        - "data/ai_control/strategy_reports/"
      target_candidates:
        - "research/datasets/structured_futures_baseline_v1_dataset_spec.yaml"
        - "research/datasets/structured_futures_long_continuation_v1_dataset_spec.yaml"
        - "research/features/structured_futures_baseline_v1_feature_manifest.yaml"
        - "research/features/structured_futures_short_breakdown_v1_feature_manifest.yaml"
        - "research/features/structured_futures_long_continuation_v1_feature_manifest.yaml"
      acceptance_checks:
        - "Feature support dotyczy tylko aktywnego albo bezposrednio nastepnego kandydata."
        - "Artefakty sa wersjonowane per candidate, a nie jako ogolna teoria."
        - "Brak zmian w runtime tradingowym i brak szerokiego docs sweepu."
      required_tests:
        - "python -m unittest trading.tests.test_structured_futures_baseline"
      definition_of_done:
        - "Kazdy aktywny candidate ma jawny dataset spec lub feature manifest."
        - "Strategy lead dostaje versioned inputs bez interpretowania luznych pomyslow."

    - module_id: "candidate_risk_gate"
      owner_agent: "risk_research_agent"
      enabled: true
      priority: 95
      max_target_files: 3
      title: "Candidate risk gate"
      module_summary: "Dostarczaj lub aktualizuj tylko risk gate dla konkretnego kandydata, zamiast szerokiego risk foundation sweepu."
      read_only_context:
        - "docs/FUTURES_TRADING_MODEL.md"
        - "docs/STRATEGY_PROMOTION_PIPELINE.md"
        - "core/risk_manager.py"
        - "data/ai_control/strategy_reports/"
      target_candidates:
        - "research/risk/structured_futures_baseline_v1_risk_report.json"
        - "research/risk/structured_futures_short_breakdown_v1_risk_report.json"
        - "research/risk/structured_futures_long_continuation_v1_risk_report.json"
      acceptance_checks:
        - "Risk gate jest per candidate i odnosi sie do konkretnego broad backtest bundle."
        - "Brak omijania RiskManagera i brak zmian w runtime tradingowym."
        - "Jesli strona strategii jest zaparkowana, risk report mowi to wprost."
      required_tests:
        - "python -m unittest trading.tests.test_structured_futures_baseline"
      definition_of_done:
        - "Kazdy aktywny candidate ma mierzalny risk gate."
        - "Risk report nadaje sie bezposrednio jako input do promotion decision."

    - module_id: "regime_detection"
      owner_agent: "regime_model_agent"
      enabled: false
      priority: 39
      max_target_files: 3
      title: "Regime detection"
      module_summary: "Buduj model reżimów rynku dopiero po foundation danych i ryzyka."
      read_only_context:
        - "docs/FUTURES_TRADING_MODEL.md"
        - "docs/RESEARCH_LAYER.md"
        - "data/ai_control/dry_run_snapshots/"
        - "data/ai_control/strategy_reports/"
      target_candidates:
        - "docs/REGIME_DETECTION.md"
        - "research/regimes/README.md"
        - "research/regimes/regime_definition_template.yaml"
      acceptance_checks:
        - "Rezimy sa operacyjne, nie magiczne."
        - "Model reżimow wspiera aktywacje i de-risking strategii."
      required_tests:
        - "python -m compileall ai_agents/runtime"
      definition_of_done:
        - "Istnieje jawny kontrakt reżimow do uzycia przez strategy lead i risk."

    - module_id: "candidate_evaluation"
      owner_agent: "experiment_evaluation_agent"
      enabled: true
      priority: 94
      max_target_files: 3
      title: "Candidate evaluation"
      module_summary: "Uruchamiaj broad backtest bundle dla aktywnego kandydata i przygotowuj promotion evidence tym samym gate'em dla wszystkich kandydatow."
      read_only_context:
        - "docs/STRATEGY_LIFECYCLE.md"
        - "docs/STRATEGY_PROMOTION_PIPELINE.md"
        - "trading/freqtrade/user_data/backtest_results/"
        - "data/ai_control/dry_run_snapshots/"
        - "data/ai_control/strategy_reports/"
      target_candidates:
        - "research/evaluation/structured_futures_baseline_v1_broad_backtest_summary.json"
        - "research/evaluation/structured_futures_short_breakdown_v1_broad_backtest_summary.json"
        - "research/evaluation/structured_futures_long_continuation_v1_broad_backtest_summary.json"
        - "research/promotion/structured_futures_baseline_v1_promotion_decision.md"
        - "research/promotion/structured_futures_short_breakdown_v1_promotion_decision.md"
        - "research/promotion/structured_futures_long_continuation_v1_promotion_decision.md"
      acceptance_checks:
        - "Broad backtest bundle uzywa zawsze tych samych okien czasu."
        - "Ocena kandydatow opiera sie na risk-adjusted quality."
        - "Brak promotion bez evidence bundle."
      required_tests:
        - "python -m unittest trading.tests.test_structured_futures_baseline"
      definition_of_done:
        - "Aktywny candidate ma broad backtest summary i promotion decision."
        - "Ocena porownawcza jest porownywalna miedzy kandydatami."

    - module_id: "control_layer_runtime"
      owner_agent: "control_layer_agent"
      enabled: true
      priority: 45
      title: "Control layer"
      module_summary: "Buduj tylko te male, reviewable przyrosty control layer w core/, ktore bezposrednio odblokowuja dane dry_run, strategie i bezpieczna obserwowalnosc systemu."
      read_only_context:
        - "docs/ARCHITECTURE.md"
        - "docs/PROJECT_MAP.md"
        - "AGENT_BOUNDARIES.md"
      target_candidates:
        - "core/"
        - "core/README.md"
        - "core/control_layer/"
        - "core/dry_run_manager.py"
        - "core/freqtrade_runtime.py"
      acceptance_checks:
        - "Zmiana zostaje w core/ i nie daje agentom write dostepu do runtime tradingowego."
        - "Read-only bridge nie ujawnia sekretow ani configow agentom."
        - "Diff pozostaje maly i reviewable."
      required_tests:
        - "python -m compileall core"
        - "python -m unittest discover -s core/tests -p test_*.py"
      definition_of_done:
        - "Kod dziala lokalnie i przechodzi wskazane checki."
        - "Nie ma zmian poza owned scope."
        - "Review agent moze ocenic diff bez dodatkowego kontekstu."

    - module_id: "monitoring_and_visibility"
      owner_agent: "monitoring_agent"
      enabled: false
      priority: 20
      title: "Monitoring i widocznosc"
      module_summary: "Rozwijaj Grafane, Prometheusa i raportowanie dla prezesa tak, aby bylo jasno widac gotowosc dry_run, swiezosc snapshotow i droge systemu do skutecznego zarabiania."
      read_only_context:
        - "docs/ARCHITECTURE.md"
        - "docs/PROJECT_MAP.md"
        - "ai_agents/config/executive_roadmap.yaml"
      target_candidates:
        - "infrastructure/grafana/dashboards/executive-roadmap.json"
        - "infrastructure/prometheus/alerts/ai_control_rules.yml"
        - "core/metrics.py"
      acceptance_checks:
        - "Zmiana zostaje w monitoringu i dashboardach."
        - "Nie ma zmian w trading runtime ani sekretach."
        - "Raportowanie jest po polsku i czytelne dla prezesa."
      required_tests:
        - "python -m compileall core"
      definition_of_done:
        - "Dashboard lub metryki sa czytelne i spójne."
        - "Diff nie narusza ownership innych warstw."

    - module_id: "api_contracts"
      owner_agent: "api_agent"
      enabled: false
      priority: 15
      title: "API i kontrakty"
      module_summary: "Rozwijaj wewnetrzne API control layer i kontrakty bez wchodzenia w trading runtime."
      read_only_context:
        - "docs/openapi.yaml"
        - "docs/ARCHITECTURE.md"
        - "AGENT_BOUNDARIES.md"
      target_candidates:
        - "core/api.py"
        - "core/schemas.py"
      acceptance_checks:
        - "Zmiana pozostaje w API i kontraktach."
        - "Brak dotkniecia live tradingu i sekretow."
        - "Publiczny kontrakt openapi nie jest rozszerzany przez endpointy operatorskie."
      required_tests:
        - "python -m compileall core"
      definition_of_done:
        - "Endpointy lub typy sa zrozumiale i reviewable."
        - "Zmiana nie wykracza poza approved scope."

    - module_id: "operator_gui"
      owner_agent: "gui_agent"
      enabled: false
      priority: 10
      title: "GUI operatorskie"
      module_summary: "Poprawiaj panel operatorski i zarzadcze widoki bez zamieniania ich w kosztowny chat."
      read_only_context:
        - "docs/ARCHITECTURE.md"
        - "ai_agents/config/executive_roadmap.yaml"
        - "core/api.py"
      target_candidates:
        - "core/templates/"
      acceptance_checks:
        - "Widoki sa po polsku i czytelne."
        - "Zmiana nie wymaga dotkniecia runtime tradingowego."
        - "Panel pozostaje operacyjny, a nie chatowy."
      required_tests:
        - "python -m compileall core"
      definition_of_done:
        - "UI jest czytelne i dziala z aktualnym API."
        - "Diff pozostaje we wlasnym scope GUI."
