coding_runtime:
  enabled: true
  auto_start: true
  lead_refresh_interval_seconds: 300
  dispatcher_poll_interval_seconds: 60
  max_active_tasks: 1
  max_target_files: 6

  modules:
    - module_id: "strategy_orchestration"
      owner_agent: "strategy_agent"
      enabled: true
      priority: 85
      max_target_files: 3
      title: "Orkiestracja strategii futures"
      module_summary: "Strategy lead spina lifecycle kandydatow, artefakty helperow i wspolny gate `backtest + risk + dry_run`."
      read_only_context:
        - "docs/ARCHITECTURE.md"
        - "docs/TRADING_SYSTEM_MASTER_PLAN.md"
        - "docs/FUTURES_TRADING_MODEL.md"
        - "data/ai_control/dry_run_snapshots/"
        - "data/ai_control/strategy_reports/"
        - "core/strategy_manager.py"
        - "core/risk_manager.py"
      target_candidates:
        - "docs/STRATEGY_LIFECYCLE.md"
        - "docs/STRATEGY_PROMOTION_PIPELINE.md"
        - "docs/AI_AGENT_ROLES.md"
        - "research/candidates/README.md"
        - "research/promotion/README.md"
      acceptance_checks:
        - "Zmiana nie modyfikuje runtime tradingowego ani sekretow."
        - "Lifecycle strategii i ownership helperow sa jednoznaczne."
        - "Kazdy kandydat przechodzi przez wspolny gate backtest + risk + dry_run."
      required_tests:
        - "python -m compileall core ai_agents/runtime"
      definition_of_done:
        - "Strategy lead ma jawny model lifecycle, handoffow i promotion gate."
        - "Diff jest maly, reviewowalny i nie wykracza poza scope strategii foundation."

    - module_id: "futures_feature_foundation"
      owner_agent: "feature_engineering_agent"
      enabled: true
      priority: 82
      max_target_files: 3
      title: "Foundation cech i datasetow futures"
      module_summary: "Buduj foundation futures-aware dla dataset buildera i feature store, bez jeszcze rozbudowanego silnika eksperymentow."
      read_only_context:
        - "docs/ARCHITECTURE.md"
        - "docs/FUTURES_TRADING_MODEL.md"
        - "core/risk_manager.py"
        - "data/ai_control/dry_run_snapshots/"
        - "data/ai_control/strategy_reports/"
      target_candidates:
        - "docs/RESEARCH_LAYER.md"
        - "docs/FEATURE_STORE.md"
        - "research/datasets/README.md"
        - "research/features/README.md"
      acceptance_checks:
        - "Zmiana traktuje futures jako futures, nie spot."
        - "Foundation uwzglednia funding, leverage, slippage i regime context."
        - "Nie ma zmian w live tradingu ani runtime configach."
      required_tests:
        - "python -m compileall core ai_agents/runtime"
      definition_of_done:
        - "Istnieje jawny foundation datasetow i feature store v1."
        - "Artefakty sa wersjonowalne i czytelne dla strategy lead."

    - module_id: "futures_risk_research"
      owner_agent: "risk_research_agent"
      enabled: true
      priority: 81
      max_target_files: 3
      title: "Foundation risk research futures"
      module_summary: "Buduj futures-aware risk foundation dla leverage, liquidation, concentration, funding drag i exposure."
      read_only_context:
        - "docs/ARCHITECTURE.md"
        - "docs/FUTURES_TRADING_MODEL.md"
        - "core/risk_manager.py"
        - "data/ai_control/dry_run_snapshots/"
        - "data/ai_control/strategy_reports/"
      target_candidates:
        - "docs/RISK_MODEL_FUTURES.md"
        - "docs/SYSTEM_OPERATING_MODEL.md"
        - "research/risk/README.md"
      acceptance_checks:
        - "Ryzyko jest opisane dla futures, nie dla spot."
        - "Brak omijania RiskManagera i brak zmian w runtime tradingowym."
        - "Kazda polityka ryzyka ma sens biznesowy i mierzalne konsekwencje."
      required_tests:
        - "python -m compileall core ai_agents/runtime"
      definition_of_done:
        - "Istnieje foundation risk modelu futures na poziomie strategii, portfela i systemu."
        - "Risk research nadaje sie jako input do gate'u promotion."

    - module_id: "alpha_research"
      owner_agent: "alpha_research_agent"
      enabled: false
      priority: 40
      max_target_files: 3
      title: "Alpha research"
      module_summary: "Generuj i filtruj male, testowalne hipotezy futures dopiero po foundation danych i ryzyka."
      read_only_context:
        - "docs/FUTURES_TRADING_MODEL.md"
        - "docs/RESEARCH_LAYER.md"
        - "docs/RISK_MODEL_FUTURES.md"
        - "data/ai_control/dry_run_snapshots/"
        - "data/ai_control/strategy_reports/"
      target_candidates:
        - "research/alpha/README.md"
        - "research/candidates/hypothesis_template.md"
        - "research/candidates/strategy_manifest_template.yaml"
      acceptance_checks:
        - "Hipotezy sa falsyfikowalne i male."
        - "Nie ma promowania strategii z pomyslu bez evidence."
      required_tests:
        - "python -m compileall ai_agents/runtime"
      definition_of_done:
        - "Istnieje jasny wzorzec hipotezy i manifestu strategii futures."

    - module_id: "regime_detection"
      owner_agent: "regime_model_agent"
      enabled: false
      priority: 39
      max_target_files: 3
      title: "Regime detection"
      module_summary: "Buduj model reżimów rynku dopiero po foundation danych i ryzyka."
      read_only_context:
        - "docs/FUTURES_TRADING_MODEL.md"
        - "docs/RESEARCH_LAYER.md"
        - "data/ai_control/dry_run_snapshots/"
        - "data/ai_control/strategy_reports/"
      target_candidates:
        - "docs/REGIME_DETECTION.md"
        - "research/regimes/README.md"
        - "research/regimes/regime_definition_template.yaml"
      acceptance_checks:
        - "Rezimy sa operacyjne, nie magiczne."
        - "Model reżimow wspiera aktywacje i de-risking strategii."
      required_tests:
        - "python -m compileall ai_agents/runtime"
      definition_of_done:
        - "Istnieje jawny kontrakt reżimow do uzycia przez strategy lead i risk."

    - module_id: "experiment_evaluation"
      owner_agent: "experiment_evaluation_agent"
      enabled: false
      priority: 38
      max_target_files: 3
      title: "Experiment evaluation"
      module_summary: "Porownuj kandydatow i buduj promotion evidence dopiero gdy istnieja juz foundation i hipotezy."
      read_only_context:
        - "docs/FEATURE_STORE.md"
        - "docs/RISK_MODEL_FUTURES.md"
        - "docs/STRATEGY_LIFECYCLE.md"
        - "data/ai_control/dry_run_snapshots/"
        - "data/ai_control/strategy_reports/"
      target_candidates:
        - "docs/EXPERIMENT_TRACKING.md"
        - "research/experiments/README.md"
        - "research/evaluation/README.md"
      acceptance_checks:
        - "Ocena kandydatow opiera sie na risk-adjusted quality."
        - "Brak promotion bez evidence bundle."
      required_tests:
        - "python -m compileall ai_agents/runtime"
      definition_of_done:
        - "Istnieje kontrakt eksperymentow, porownania kandydatow i promotion evidence."

    - module_id: "control_layer_runtime"
      owner_agent: "control_layer_agent"
      enabled: true
      priority: 90
      title: "Control layer"
      module_summary: "Buduj tylko te male, reviewable przyrosty control layer w core/, ktore bezposrednio odblokowuja dane dry_run, strategie i bezpieczna obserwowalnosc systemu."
      read_only_context:
        - "docs/ARCHITECTURE.md"
        - "docs/PROJECT_MAP.md"
        - "AGENT_BOUNDARIES.md"
      target_candidates:
        - "core/"
        - "core/README.md"
        - "core/control_layer/"
        - "core/dry_run_manager.py"
        - "core/freqtrade_runtime.py"
      acceptance_checks:
        - "Zmiana zostaje w core/ i nie daje agentom write dostepu do runtime tradingowego."
        - "Read-only bridge nie ujawnia sekretow ani configow agentom."
        - "Diff pozostaje maly i reviewable."
      required_tests:
        - "python -m compileall core"
        - "python -m unittest discover -s core/tests -p test_*.py"
      definition_of_done:
        - "Kod dziala lokalnie i przechodzi wskazane checki."
        - "Nie ma zmian poza owned scope."
        - "Review agent moze ocenic diff bez dodatkowego kontekstu."

    - module_id: "monitoring_and_visibility"
      owner_agent: "monitoring_agent"
      enabled: true
      priority: 100
      title: "Monitoring i widocznosc"
      module_summary: "Rozwijaj Grafane, Prometheusa i raportowanie dla prezesa tak, aby bylo jasno widac gotowosc dry_run, swiezosc snapshotow i droge systemu do skutecznego zarabiania."
      read_only_context:
        - "docs/ARCHITECTURE.md"
        - "docs/PROJECT_MAP.md"
        - "ai_agents/config/executive_roadmap.yaml"
      target_candidates:
        - "infrastructure/grafana/dashboards/executive-roadmap.json"
        - "infrastructure/prometheus/alerts/ai_control_rules.yml"
        - "core/metrics.py"
      acceptance_checks:
        - "Zmiana zostaje w monitoringu i dashboardach."
        - "Nie ma zmian w trading runtime ani sekretach."
        - "Raportowanie jest po polsku i czytelne dla prezesa."
      required_tests:
        - "python -m compileall core"
      definition_of_done:
        - "Dashboard lub metryki sa czytelne i spójne."
        - "Diff nie narusza ownership innych warstw."

    - module_id: "api_contracts"
      owner_agent: "api_agent"
      enabled: true
      priority: 70
      title: "API i kontrakty"
      module_summary: "Rozwijaj wewnetrzne API control layer i kontrakty bez wchodzenia w trading runtime."
      read_only_context:
        - "docs/openapi.yaml"
        - "docs/ARCHITECTURE.md"
        - "AGENT_BOUNDARIES.md"
      target_candidates:
        - "core/api.py"
        - "core/schemas.py"
      acceptance_checks:
        - "Zmiana pozostaje w API i kontraktach."
        - "Brak dotkniecia live tradingu i sekretow."
        - "Publiczny kontrakt openapi nie jest rozszerzany przez endpointy operatorskie."
      required_tests:
        - "python -m compileall core"
      definition_of_done:
        - "Endpointy lub typy sa zrozumiale i reviewable."
        - "Zmiana nie wykracza poza approved scope."

    - module_id: "operator_gui"
      owner_agent: "gui_agent"
      enabled: true
      priority: 60
      title: "GUI operatorskie"
      module_summary: "Poprawiaj panel operatorski i zarzadcze widoki bez zamieniania ich w kosztowny chat."
      read_only_context:
        - "docs/ARCHITECTURE.md"
        - "ai_agents/config/executive_roadmap.yaml"
        - "core/api.py"
      target_candidates:
        - "core/templates/"
      acceptance_checks:
        - "Widoki sa po polsku i czytelne."
        - "Zmiana nie wymaga dotkniecia runtime tradingowego."
        - "Panel pozostaje operacyjny, a nie chatowy."
      required_tests:
        - "python -m compileall core"
      definition_of_done:
        - "UI jest czytelne i dziala z aktualnym API."
        - "Diff pozostaje we wlasnym scope GUI."
