services:
  postgres:
    image: postgres:16
    container_name: crypto_postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: crypto_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  grafana:
    image: grafana/grafana:12.4.0
    container_name: crypto_grafana
    restart: unless-stopped
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana

  freqtrade:
    image: freqtradeorg/freqtrade:stable
    container_name: crypto_freqtrade
    restart: "no"
    working_dir: /freqtrade
    volumes:
      - ./trading/freqtrade/user_data:/freqtrade/user_data
    command:
      - webserver
      - --config
      - /freqtrade/user_data/config.json

volumes:
  postgres_data:
  redis_data:
  grafana_data:
